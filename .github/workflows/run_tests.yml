name: Automated Testing

# 1. Define when GitHub Actions will run
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 2. Define the jobs to be done
jobs:
  test:
    # Run on GitHub's latest Ubuntu operating system
    runs-on: ubuntu-latest

    # 3. Sequential steps to execute
    steps:
    # Step 3.1: Checkout your code from the repository to the GitHub server
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 3.2: Set up Python environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3.3: Install necessary dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 3.4: Run test command
    - name: Run pytest
      run: |
        pytest tests/